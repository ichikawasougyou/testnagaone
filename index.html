<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>3D Model Viewer</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 16px;
    }

    h1 {
      text-align: center;
      font-size: 28px;
      line-height: 1.6;
      margin: 10px 0;
    }

    model-viewer {
      width: 100%;
      max-width: 900px;
      height: 60vh;
      background: #8C8C8C;
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }

    footer {
      font-size: 14px;
      color: #666;
    }
  </style>
</head>
<body>

  <h1>
    令和７年度<br>
    県単道路改築工事
  </h1>

  <model-viewer
    src="model.glb"
    alt="My 3D model"
    camera-controls
    auto-rotate

	camera-orbit="90deg 75deg 1.5m"
  　camera-target="0m 0.5m 0m"
 　 field-of-view="25deg"
	  
    environment-image="neutral"
    ar
    ios-src="model.usdz">
  </model-viewer>

  <footer>スマホで回転・拡大できます。<br><br>
	  イメージモデルです。<br>
	  撮影時期および過去の工事状況により、現在の状況と異なる場合がありますのでご了承ください。<br><br>
	  
	  空中写真：国土地理院提供（国土地理院ウェブサイトより）<br>

	  
  </footer>

</body>
</html>
